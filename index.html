.top-controls { display: flex; gap: 8px; align-items: center; }
.custom-select { background: transparent; border: 1px solid var(--border-color); color: var(--text-main); padding: 5px 10px; border-radius: 20px; font-size: 0.8rem; font-weight: 600; outline: none; cursor: pointer; appearance: none; text-align: center; font-family: inherit; }
.theme-toggle { background: transparent; border: 1px solid var(--border-color); color: var(--text-main); width: 32px; height: 32px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; }

.rooms-grid { display: grid; gap: 1.5rem; padding: 0 1.5rem 2rem; }
.room-card { background: var(--bg-card); border-radius: var(--radius-lg); overflow: hidden; border: 1px solid var(--border-color); box-shadow: 0 8px 32px rgba(0,0,0,0.05); cursor: pointer; }
.room-image { height: 200px; background-size: cover; background-position: center; position: relative; }

.room-content { padding: 1.5rem; position: relative; z-index: 2; }
.room-title { font-size: 1.2rem; margin-bottom: 0.5rem; }

.room-price { font-family: 'Playfair Display', serif; font-size: 1.4rem; color: var(--gold); font-weight: 600; }

.counter-label { font-weight: 600; font-size: 1rem; }
.counter-sub { font-size: 0.75rem; color: var(--text-muted); display: block; }

.counter-ctrl button { background: transparent; border: none; color: var(--gold); font-size: 1.5rem; cursor: pointer; padding: 0 10px; outline: none; }
.counter-ctrl input { width: 30px; text-align: center; background: transparent; border: none; color: var(--text-main); font-weight: 600; font-size: 1.1rem; pointer-events: none; padding: 0; }

<body>

<div class="header">
  <div class="logo-mini">Old Tashkent</div>
  <div class="top-controls">
    <select id="langSelect" class="custom-select" onchange="changeLang(this.value)">
      <option value="uz">🇺🇿 UZ</option>
      <option value="ru">🇷🇺 RU</option>
      <option value="en">🇬🇧 EN</option>
    </select>
    <select id="currSelect" class="custom-select" onchange="changeCurrency(this.value)">
      <option value="USD">💵 USD</option>
      <option value="UZS">💳 UZS</option>
    </select>
    <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">🌙</button>
  </div>
</div>

<div class="hero-section">
  <h1 class="hero-title">Old Tashkent Hotel</h1>
  <p class="hero-subtitle" id="t_subtitle">Mehmondo'stlik va qulaylik uyg'unligi.</p>

</div>

<div class="rooms-grid" id="roomsContainer"></div>

<div class="booking-section" id="bookingSection">
  <h2 style="margin-bottom: 2rem; font-size: 1.5rem;" id="t_book_title">Bron ma'lumotlari</h2>
  
  <form id="bookForm" onsubmit="submitBook(event)">
    <div class="form-group">
      <label class="form-label" id="t_room_type">Xona turi</label>
      <select name="room_type" id="fi_room" class="form-input" required onchange="updatePricePreview()"></select>
    </div>
    
    <div style="display: flex; gap: 15px;">
      <div class="form-group" style="flex:1;">
        <label class="form-label" id="t_check_in">Kelish (14:00 dan)</label>
        <input type="date" name="check_in" id="fi_checkin" class="form-input" required onchange="updatePricePreview()">
      </div>
      <div class="form-group" style="flex:1;">
        <label class="form-label" id="t_check_out">Ketish (12:00 gacha)</label>
        <input type="date" name="check_out" id="fi_checkout" class="form-input" required onchange="updatePricePreview()">
      </div>
    </div>

    <label class="form-label" id="t_guests">Mehmonlar</label>
    <div class="guest-counters">
      <div class="counter-row">
        <div><span class="counter-label" id="t_adults">Kattalar</span><span class="counter-sub" id="t_adults_sub">12+ yosh</span></div>
        <div class="counter-ctrl">
          <button type="button" onclick="updateCount('adult', -1)">-</button>
          <input type="number" id="adult_count" name="adults" value="1" readonly>
          <button type="button" onclick="updateCount('adult', 1)">+</button>
        </div>
      </div>
      <div class="counter-row">
        <div><span class="counter-label" id="t_children">Bolalar</span><span class="counter-sub" id="t_children_sub">12 yoshgacha</span></div>
        <div class="counter-ctrl">
          <button type="button" onclick="updateCount('child', -1)">-</button>
          <input type="number" id="child_count" name="children" value="0" readonly>
          <button type="button" onclick="updateCount('child', 1)">+</button>
        </div>
      </div>
    </div>

    <label class="form-label" id="t_trip">Safar maqsadi</label>
    <div class="chip-group" id="tripTypeGroup">
      <button type="button" class="chip active" onclick="selectTripType('Juftlik', this)" data-t="trip_couple">💑 Juftlik</button>
      <button type="button" class="chip" onclick="selectTripType('Oilaviy', this)" data-t="trip_family">👨‍👩‍👧‍👦 Oilaviy</button>
      <button type="button" class="chip" onclick="selectTripType('Dostlar', this)" data-t="trip_friends">🎉 Do'stlar</button>
      <button type="button" class="chip" onclick="selectTripType('Biznes', this)" data-t="trip_business">💼 Biznes</button>
      <button type="button" class="chip" onclick="selectTripType('Yolgiz', this)" data-t="trip_solo">👤 Yolg'iz</button>
    </div>
    <input type="hidden" name="trip_type" id="trip_type" value="Juftlik">

    <label class="form-label" id="t_payment">To'lov usuli</label>
    <div class="chip-group" id="paymentTypeGroup">
      <button type="button" class="chip active" onclick="selectPayment('joyida', this)" data-t="pay_onsite">🏨 Joyida to'lash</button>
      <button type="button" class="chip" onclick="selectPayment('avans', this)" data-t="pay_card">💳 10% Avans</button>
    </div>
    <input type="hidden" name="payment_type" id="payment_type" value="joyida">

    <div class="payment-box" id="avansBox">
      <p style="font-size: 0.85rem; color: var(--text-main);" id="t_card_desc">Broningiz kafolatlanishi uchun quyidagi kartaga to'lov qiling:</p>
      <div class="card-number">9860 3401 0170 8832</div>
      <p style="font-size: 0.9rem; text-align: center; color: var(--text-muted);">
        <span id="t_transfer_amount">Avans summasi:</span> <b id="avansAmount" style="color: var(--gold); font-size: 1.1rem;">$0</b>
      </p>
    </div>

    <div class="form-group">
      <label class="form-label" id="t_name">To'liq ism</label>
      <input type="text" name="first_name" id="fi_name" class="form-input" placeholder="Ism Familiya" required>
    </div>
    <div class="form-group">
      <label class="form-label" id="t_phone">Telefon raqam</label>
      <input type="tel" name="phone" id="fi_phone" class="form-input" placeholder="+998 90 123 45 67" required>
    </div>
    <div class="form-group">
      <label class="form-label" id="t_requests">Maxsus istaklar</label>
      <input type="text" name="special_requests" id="fi_req" class="form-input" placeholder="...">
    </div>

    <div class="price-box">
      <div style="font-weight: 600; font-size: 1.1rem; text-transform: uppercase;" id="t_total">Jami to'lov:</div>
      <div style="font-size: 1.8rem; color: var(--gold); font-family: 'Playfair Display', serif;" id="ppTotal">$0</div>
    </div>

    <input type="hidden" name="total_price" id="hidden_total">
    <input type="hidden" name="currency" id="hidden_curr" value="USD">

    <button type="submit" class="btn-primary" id="t_btn_book">BRON SO'ROVINI YUBORISH</button>
  </form>
</div>

<div class="modal-backdrop" id="modalBackdrop" onclick="closeModal()"></div>
<div class="modal-content" id="roomModal">
  <button class="modal-close" onclick="closeModal()">✕</button>
  <div class="modal-img" id="mImg"></div>
  <div class="modal-body">
    <h2 id="mTitle" style="font-size: 1.6rem; margin-bottom: 10px; color: var(--gold);"></h2>
    <p id="mDesc" style="color: var(--text-muted); font-size: 0.9rem; line-height: 1.6;"></p>
    <h3 style="margin-top: 1.5rem; font-size: 1rem; border-bottom: 1px solid var(--border-color); padding-bottom: 10px;" id="t_amenities_title">Qulayliklar</h3>
    <div class="amenities-grid" id="mAmenities"></div>
    <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 2rem; background: rgba(0,0,0,0.02); padding: 15px; border-radius: 15px; border: 1px solid var(--border-color);">
      <div><span style="font-size: 1.6rem; color: var(--gold); font-family: 'Playfair Display';" id="mPrice"></span><span style="font-size:0.8rem; color:var(--text-muted);" id="t_per_night">/kecha</span></div>

    </div>
  </div>
</div>

  two_bedroom_suite: { price: 120, max_guests: 4, img: "https://images.unsplash.com/photo-1590490359683-658d3d23f972?auto=format&fit=crop&w=800&q=80", name: { uz: "Two-Bedroom Suite (Lyuks)", ru: "Люкс с двумя спальнями", en: "Two-Bedroom Suite" }, desc: { uz: "Alohida yotoqxonalar va dam olish zonasiga ega bo'lgan 2 xonali Lyuks.", ru: "Двухкомнатный люкс с отдельными спальнями и зоной отдыха.", en: "Two-room suite with separate bedrooms and a seating area." }, amenities: { uz: ["1 yotoqxona, 1 mehmonxona", "Vanna va Dush", "2 ta TV", "Premium Xizmat"], ru: ["1 спальня, 1 гостиная", "Ванна и Душ", "2 ТВ", "Премиум сервис"], en: ["1 bedroom, 1 living room", "Bath & Shower", "2 TVs", "Premium Service"] } }
};

function toggleTheme() { document.body.classList.toggle('dark-mode'); document.getElementById('themeBtn').innerText = document.body.classList.contains('dark-mode') ? '☀️' : '🌙'; }

function changeLang(lang) { 
  currentLang = lang; 
  const textIds = ['subtitle','book_title','room_type','check_in','check_out','guests','adults','adults_sub','children','children_sub','trip','payment','card_desc','transfer_amount','name','phone','requests','total','btn_book','amenities_title','per_night','btn_select'];
  textIds.forEach(id => { const el = document.getElementById('t_' + id); if (el) el.innerText = I18N[lang][id]; }); 
  document.querySelectorAll('.chip').forEach(btn => { if(btn.dataset.t && I18N[lang][btn.dataset.t]) btn.innerText = I18N[lang][btn.dataset.t]; }); 
  renderRooms(); updatePricePreview(); 
}

function changeCurrency(curr) { currentCurr = curr; document.getElementById('hidden_curr').value = curr; renderRooms(); updatePricePreview(); }
function formatMoney(amountUSD) { return currentCurr === 'UZS' ? (amountUSD * EXCHANGE_RATE).toLocaleString() + ' UZS' : '$' + amountUSD.toLocaleString(); }

window.onload = () => {
  if(tg.initDataUnsafe?.user) document.getElementById('fi_name').value = `${tg.initDataUnsafe.user.first_name || ''} ${tg.initDataUnsafe.user.last_name || ''}`.trim();
  const today = new Date().toISOString().split('T')[0]; document.getElementById('fi_checkin').min = today; document.getElementById('fi_checkin').value = today;
  const tomorrow = new Date(); tomorrow.setDate(tomorrow.getDate() + 1); document.getElementById('fi_checkout').min = tomorrow.toISOString().split('T')[0]; document.getElementById('fi_checkout').value = tomorrow.toISOString().split('T')[0];
  renderRooms(); updatePricePreview();
};

function renderRooms() {
  const container = document.getElementById('roomsContainer'); const select = document.getElementById('fi_room'); const savedVal = select.value;
  container.innerHTML = ''; select.innerHTML = '';
  Object.keys(ROOMS).forEach(key => {
    const r = ROOMS[key];
    container.innerHTML += `<div class="room-card" onclick="openModal('${key}')"><div class="room-image" style="background-image: url('${r.img}')"></div><div class="room-content"><h3 class="room-title">${r.name[currentLang]}</h3><p class="room-desc-short">${r.desc[currentLang].substring(0, 60)}...</p><div class="room-footer"><div class="room-price">${formatMoney(r.price)}</div><button class="btn-outline">${I18N[currentLang].btn_details}</button></div></div></div>`;
    select.innerHTML += `<option value="${key}">${r.name[currentLang]}</option>`;
  });
  if (savedVal) select.value = savedVal;
}

function selectTripType(type, btn) { document.getElementById('trip_type').value = type; document.querySelectorAll('#tripTypeGroup .chip').forEach(c => c.classList.remove('active')); btn.classList.add('active'); }
function selectPayment(type, btn) { document.getElementById('payment_type').value = type; document.querySelectorAll('#paymentTypeGroup .chip').forEach(c => c.classList.remove('active')); btn.classList.add('active'); document.getElementById('avansBox').style.display = (type === 'avans') ? 'block' : 'none'; }
function updateCount(type, change) { const a = document.getElementById('adult_count'); const c = document.getElementById('child_count'); const max = ROOMS[document.getElementById('fi_room').value]?.max_guests || 2; let av = parseInt(a.value); let cv = parseInt(c.value); if (type === 'adult') { if (av + change >= 1) av += change; } else { if (cv + change >= 0) cv += change; } if (av + cv > max) return tg.showAlert(currentLang==='uz' ? `Sig'im cheklangan` : 'Capacity limit'); a.value = av; c.value = cv; }
function openModal(key) { currentSelectedRoom = key; const r = ROOMS[key]; document.getElementById('mImg').style.backgroundImage = `url('${r.img}')`; document.getElementById('mTitle').innerText = r.name[currentLang]; document.getElementById('mDesc').innerText = r.desc[currentLang]; document.getElementById('mPrice').innerText = formatMoney(r.price); let amHtml = ''; r.amenities[currentLang].forEach(a => { amHtml += `<div class="amenity-item"><span class="check-icon">✓</span> ${a}</div>`; }); document.getElementById('mAmenities').innerHTML = amHtml; document.getElementById('modalBackdrop').classList.add('show'); document.getElementById('roomModal').classList.add('show'); }
function closeModal() { document.getElementById('modalBackdrop').classList.remove('show'); document.getElementById('roomModal').classList.remove('show'); }
function selectRoomFromModal() { closeModal(); document.getElementById('fi_room').value = currentSelectedRoom; document.getElementById('bookingSection').scrollIntoView({ behavior: 'smooth' }); updatePricePreview(); }

function updatePricePreview() { 
  const ci = document.getElementById('fi_checkin').value; 
  const co = document.getElementById('fi_checkout').value; 
  const rt = document.getElementById('fi_room').value; 
  if (!ci || !co || !rt) return; 
  const nights = Math.max(1, Math.round((new Date(co)-new Date(ci))/(86400000))); 
  const totalUSD = ROOMS[rt].price * nights; 
  document.getElementById('hidden_total').value = formatMoney(totalUSD); 
  document.getElementById('ppTotal').textContent = formatMoney(totalUSD); 
  document.getElementById('avansAmount').textContent = formatMoney(totalUSD * 0.1);
}

async function submitBook(e) {
  e.preventDefault();
  const form = e.target; 
  const btn = document.getElementById('t_btn_book');
  const data = Object.fromEntries(new FormData(form)); 
  data.tg_id = tg.initDataUnsafe?.user?.id || '';
  
  btn.innerText = 'KUTING...'; 
  btn.disabled = true;

  try {
    const resp = await fetch(`${API_BASE}/api/bookings`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) });
    const result = await resp.json();
    if (result.success) { 
        tg.showAlert("✅ " + (currentLang==='uz'?"Bron so'rovi yuborildi!":currentLang==='ru'?"Успешно отправлено!":"Request sent successfully!")); 
        setTimeout(() => tg.close(), 2000); 
    } else { 
        tg.showAlert("❌ Xatolik yuz berdi"); 
        btn.innerText = I18N[currentLang]['btn_book']; btn.disabled = false; 
    }
  } catch(err) { 
      tg.showAlert("🌐 Server bilan aloqa yo'q"); 
      btn.innerText = I18N[currentLang]['btn_book']; btn.disabled = false; 
  }
}
</script>
